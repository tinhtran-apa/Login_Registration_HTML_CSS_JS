<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="../../shared/css/reset.css" />
    <link rel="stylesheet" href="../../shared/css/variables.css" />
    <link rel="stylesheet" href="../../shared/css/typography.css" />
    <link rel="stylesheet" href="../../shared/css/common.css" />
    <link rel="stylesheet" href="../../layout/Header/header.css" />
    <link rel="stylesheet" href="../../components/LeftPanel/left-panel.css" />
    <link rel="stylesheet" href="../../components/RightPanel/right-panel.css" />
    <link rel="stylesheet" href="./reset-password.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div data-include="../../layout/Header/header.html"></div>
    <main>
      <div class="container">
        <div class="panel">
          <div data-include="../../components/LeftPanel/left-panel.html"></div>
          <div data-include="../../components/RightPanel/right-panel.html">
            <div class="content__icon">
              <img src="../../assets/icons/lock.svg" alt="" />
            </div>
            <div class="content__title">
              <h4>Set a new password</h4>
              <span>Choose a strong password you haven't used before. It must be at least 8 characters.</span>
            </div>
            <form class="form">
              <div class="form__input">
                <div class="form__input--error">
                  <label for="password" id="label_password">New password</label>
                </div>
                <div class="form__show-password">
                  <input type="password" name="" id="new_password" placeholder="Enter your password" />
                  <button type="button" id="show_password">
                    <img src="./assets/icons/eye.svg" alt="" width="16" height="16" />
                  </button>
                </div>
              </div>
              <div class="form__input">
                <div class="form__input--error">
                  <label for="password" id="label_confirm_new_password">Confirm new password</label>
                </div>
                <div class="form__show-password">
                  <input type="password" name="" id="confirm_password" placeholder="Re-enter your password" />
                  <button type="button" id="show_confirm_password">
                    <img src="./assets/icons/eye.svg" alt="" width="16" height="16" />
                  </button>
                </div>
              </div>
              <button type="submit" class="form__button">Update password</button>
            </form>
            <div class="auth__switch">
              <a class="auth__back" href="./index.html">
                <img src="../../assets/icons/arrow_left.svg" alt="" />
                <span>Back to sign in</span></a
              >
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="../../shared/js/include.js"></script>
    <script type="module" src="../../layout/Header/header.js"></script>
  </body>
</html>
