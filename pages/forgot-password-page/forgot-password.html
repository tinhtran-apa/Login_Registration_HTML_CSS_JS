<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../shared/css/reset.css" />
    <link rel="stylesheet" href="../../shared/css/variables.css" />
    <link rel="stylesheet" href="../../shared/css/typography.css" />
    <link rel="stylesheet" href="../../shared/css/common.css" />
    <link rel="stylesheet" href="../../layout/header/header.css" />
    <link rel="stylesheet" href="../../components/left-panel/left-panel.css" />
    <link rel="stylesheet" href="../../components/right-panel/right-panel.css" />
    <link rel="stylesheet" href="forgot-password.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div data-include="../../layout/header/header.html"></div>
    <main>
      <div class="container">
        <div class="panel">
          <div data-include="../../components/left-panel/left-panel.html"></div>
          <div data-include="../../components/right-panel/right-panel.html">
            <div class="content__icon">
              <img src="../../assets/icons/mail.svg" alt="" />
            </div>
            <div class="content__title">
              <h4>Forgot Password</h4>
              <span>No problem. Enter the email tied to your account and we'll send you a reset link</span>
            </div>
            <form class="form">
              <div class="form__input">
                <div class="form__input--error">
                  <label for="email" id="label_email">Email</label>
                </div>
                <input type="email" name="" id="email" placeholder="Enter your email" />
              </div>
              <button type="submit" class="form__button">Send reset link</button>
            </form>
            <div class="auth__switch">
              <a class="auth__back" href="./index.html">
                <img src="../../assets/icons/arrow_left.svg" alt="" />
                <span>Back to sign in</span></a
              >
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="../../shared/js/include.js"></script>
    <script type="module" src="../../layout/header/header.js"></script>
  </body>
</html>
