<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email</title>
    <link rel="stylesheet" href="../../shared/css/reset.css" />
    <link rel="stylesheet" href="../../shared/css/variables.css" />
    <link rel="stylesheet" href="../../shared/css/typography.css" />
    <link rel="stylesheet" href="../../shared/css/common.css" />
    <link rel="stylesheet" href="/layout/header/header.css" />
    <link rel="stylesheet" href="../../components/left-panel/left-panel.css" />
    <link rel="stylesheet" href="../../components/right-panel/right-panel.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <div data-include="../../layout/header/header.html"></div>
    <main>
      <div class="container">
        <div class="panel">

          <div data-include="../../components/right-panel/right-panel.html">
            <div class="content__icon">
              <img src="../../assets/icons/mail.svg" alt="" />

            <div class="content__title">
              <h4>Verify your email</h4>

              <span>We sent a 6-digit code to <span>your email</span>. Enter it below to confirm your address.</span>
            </div>
            <form class="form">
              <div class="form__input">
                <input type="text" />

                <input type="text" />

                <input type="text" />

                <input type="text" />

                <input type="text" />

                <input type="text" />
              </div>

              <button type="submit" class="form__button">Verify email</button>
            </form>

            <div class="auth__switch">
              <span>Didn't get it? </span>

              <a href="/pages/register-page/register.html">Resend Code</a>
            </div>

            <div class="auth__switch">
              <a class="auth__back" href="/index.html">
                <img src="../../assets/icons/arrow_left.svg" alt="" />

                <span>Back to sign in</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="../../shared/js/include.js"></script>
    <script type="module" src="../../layout/header/header.js"></script>
